databases:
  - name: smartqueue_db
    databaseName: smartqueue
    user: smartqueue_user

services:
  - type: web
    name: smart-queue
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn smart_queue.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartqueue_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://queuenova.onrender.com"
      - key: ALLOWED_HOSTS
        value: "queuenova.onrender.com"

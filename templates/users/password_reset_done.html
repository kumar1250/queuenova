{% extends 'base.html' %}
{% block title %}OTP Sent{% endblock %}
{% block extra_css %}<style>.auth-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}</style>{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="text-center animate__animated animate__zoomIn animate__faster" style="max-width:420px;">
        <div style="width:80px;height:80px;background:#dbeafe;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:2.5rem;color:#1e40af;margin-bottom:1.5rem;">
            <i class="bi bi-envelope-check-fill"></i>
        </div>
        <h2 class="fw-800 mb-2">Check Your Email</h2>
        <p class="text-muted mb-4">If an account exists with that email, we've sent a 6-digit OTP. Check your inbox and spam folder.</p>
        <a href="{% url 'users:password_reset_verify' %}" class="btn btn-primary btn-lg btn-pill px-5">Enter OTP</a>
        <div class="mt-3">
            <a href="{% url 'users:login' %}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}

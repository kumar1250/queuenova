{% extends 'base.html' %}
{% block title %}Check Your Email{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&display=swap');
  :root{--ink:#0a0a0f;--glow:#3b82f6;--glow2:#6366f1;--text-hi:#f8f8ff;--text-lo:rgba(248,248,255,0.45);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);}
  .auth-page{min-height:calc(100vh - 72px);background:var(--ink);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;}
  .auth-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .auth-bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.12;animation:orbFloat 9s ease-in-out infinite;}
  .orb-1{width:400px;height:400px;background:var(--glow);top:-80px;left:-80px;animation-delay:0s;}
  .orb-2{width:300px;height:300px;background:var(--glow2);bottom:-80px;right:-60px;animation-delay:-5s;}
  @keyframes orbFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
  .auth-card{position:relative;z-index:10;width:100%;max-width:420px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;text-align:center;animation:cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes cardReveal{from{opacity:0;transform:translateY(28px)scale(0.97);}to{opacity:1;transform:translateY(0)scale(1);}}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glow),var(--glow2),transparent);}
  .auth-card-inner{padding:3rem 2.25rem;}
  /* Envelope animation */
  .email-icon-wrap{position:relative;display:inline-block;margin-bottom:1.75rem;}
  .email-icon-bg{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,var(--glow),var(--glow2));display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;margin:0 auto;box-shadow:0 0 40px rgba(59,130,246,0.4);animation:emailPulse 2s ease-in-out infinite;}
  @keyframes emailPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .email-ripple{position:absolute;inset:-12px;border-radius:32px;border:2px solid rgba(59,130,246,0.2);animation:ripple 2s ease-out infinite;}
  .email-ripple2{position:absolute;inset:-24px;border-radius:40px;border:2px solid rgba(59,130,246,0.1);animation:ripple 2s ease-out 0.5s infinite;}
  @keyframes ripple{0%{transform:scale(0.9);opacity:1;}100%{transform:scale(1.2);opacity:0;}}
  .auth-title{font-family:'Clash Display','Syne',sans-serif;font-weight:700;font-size:1.7rem;color:var(--text-hi);margin-bottom:0.5rem;letter-spacing:-0.02em;}
  .auth-subtitle{color:var(--text-lo);font-size:0.875rem;line-height:1.7;margin-bottom:2rem;}
  .auth-btn{display:inline-flex;align-items:center;gap:8px;padding:0.85rem 2.5rem;border-radius:50px;background:linear-gradient(135deg,var(--glow),var(--glow2));border:none;color:white;font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 24px rgba(59,130,246,0.35);}
  .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,0.5);color:white;}
  .auth-back{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-lo);text-decoration:none;margin-top:1.25rem;transition:color 0.2s;}
  .auth-back:hover{color:var(--text-hi);}
  .auth-card-inner>*{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
  .auth-card-inner>*:nth-child(1){animation-delay:0.1s}.auth-card-inner>*:nth-child(2){animation-delay:0.18s}.auth-card-inner>*:nth-child(3){animation-delay:0.26s}.auth-card-inner>*:nth-child(4){animation-delay:0.34s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg-orb orb-1"></div>
    <div class="auth-bg-orb orb-2"></div>
  </div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="email-icon-wrap">
        <div class="email-ripple"></div>
        <div class="email-ripple2"></div>
        <div class="email-icon-bg"><i class="bi bi-envelope-check-fill"></i></div>
      </div>
      <h1 class="auth-title">Check your email</h1>
      <p class="auth-subtitle">If an account exists with that email address, we've sent a 6-digit OTP. Check your inbox and spam folder.</p>
      <a href="{% url 'users:password_reset_verify' %}" class="auth-btn">Enter OTP <i class="bi bi-arrow-right"></i></a>
      <br>
      <a href="{% url 'users:login' %}" class="auth-back"><i class="bi bi-arrow-left"></i>Back to login</a>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&display=swap');
  :root{--ink:#0a0a0f;--glow:#e94560;--glow2:#7c3aed;--text-hi:#f8f8ff;--text-lo:rgba(248,248,255,0.45);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);}
  .auth-page{min-height:calc(100vh - 72px);background:var(--ink);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;}
  .auth-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .auth-bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.14;animation:orbFloat 9s ease-in-out infinite;}
  .orb-1{width:380px;height:380px;background:var(--glow);top:-80px;right:-80px;animation-delay:0s;}
  .orb-2{width:280px;height:280px;background:var(--glow2);bottom:-60px;left:-60px;animation-delay:-5s;}
  @keyframes orbFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-22px);}}
  .auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:55px 55px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);}
  .auth-card{position:relative;z-index:10;width:100%;max-width:420px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;animation:cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes cardReveal{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glow),var(--glow2),transparent);animation:shimmer 4s linear infinite;background-size:200% 100%;}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  .auth-card-inner{padding:2.5rem 2.25rem;}
  .auth-logo-mark{width:56px;height:56px;background:linear-gradient(135deg,var(--glow),var(--glow2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;margin-bottom:1.5rem;box-shadow:0 0 36px rgba(233,69,96,0.4);}
  .auth-title{font-family:'Clash Display','Syne',sans-serif;font-weight:700;font-size:1.7rem;color:var(--text-hi);margin-bottom:0.3rem;letter-spacing:-0.03em;}
  .auth-subtitle{color:var(--text-lo);font-size:0.85rem;margin-bottom:2rem;}
  .field-wrap{margin-bottom:1.1rem;}
  .field-label{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-lo);margin-bottom:0.5rem;transition:color 0.2s;}
  .field-input-wrap{position:relative;}
  .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.22);pointer-events:none;transition:color 0.2s;}
  .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);cursor:pointer;background:none;border:none;padding:0;transition:color 0.2s;}
  .toggle-pw:hover{color:var(--glow);}
  .auth-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:10px;color:var(--text-hi);font-size:0.9rem;padding:0.75rem 2.8rem 0.75rem 2.6rem;outline:none;transition:all 0.25s;-webkit-appearance:none;}
  .auth-input::placeholder{color:rgba(255,255,255,0.18);}
  .auth-input:focus{border-color:var(--glow);background:rgba(233,69,96,0.06);box-shadow:0 0 0 3px rgba(233,69,96,0.12);}
  .field-wrap:focus-within .field-label{color:var(--glow);}
  .field-wrap:focus-within .field-icon{color:var(--glow);}
  /* Strength bar */
  .pw-strength{height:3px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:6px;overflow:hidden;}
  .pw-strength-bar{height:100%;width:0;border-radius:3px;transition:width 0.4s,background 0.4s;}
  .pw-hint{font-size:0.72rem;margin-top:4px;transition:color 0.3s;}
  .auth-btn{width:100%;background:linear-gradient(135deg,var(--glow),#c73652);border:none;border-radius:10px;color:white;font-size:0.9rem;font-weight:700;padding:0.85rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(233,69,96,0.3);margin-top:0.5rem;}
  .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(233,69,96,0.5);}
  .auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .auth-card-inner>*{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
  .auth-card-inner>*:nth-child(1){animation-delay:0.1s}.auth-card-inner>*:nth-child(2){animation-delay:0.15s}.auth-card-inner>*:nth-child(3){animation-delay:0.2s}.auth-card-inner>*:nth-child(4){animation-delay:0.25s}.auth-card-inner>*:nth-child(5){animation-delay:0.3s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){.auth-card-inner{padding:2rem 1.5rem;}}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg-orb orb-1"></div>
    <div class="auth-bg-orb orb-2"></div>
    <div class="auth-grid"></div>
  </div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo-mark"><i class="bi bi-lock-fill"></i></div>
      <h1 class="auth-title">New password</h1>
      <p class="auth-subtitle">Choose a strong password for your account.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="field-wrap">
          <label class="field-label" for="pwInput">New Password</label>
          <div class="field-input-wrap">
            <input type="password" name="password" id="pwInput" class="auth-input" placeholder="Min 8 characters" required>
            <i class="bi bi-lock field-icon"></i>
            <button type="button" class="toggle-pw" onclick="togglePw('pwInput',this)"><i class="bi bi-eye"></i></button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="strengthBar"></div></div>
          <div class="pw-hint" id="strengthHint" style="color:rgba(255,255,255,0.3);">Enter a password</div>
        </div>
        <div class="field-wrap">
          <label class="field-label" for="pwConfirm">Confirm Password</label>
          <div class="field-input-wrap">
            <input type="password" name="confirm_password" id="pwConfirm" class="auth-input" placeholder="Repeat new password" required>
            <i class="bi bi-lock-fill field-icon"></i>
            <button type="button" class="toggle-pw" onclick="togglePw('pwConfirm',this)"><i class="bi bi-eye"></i></button>
          </div>
          <div class="pw-hint" id="matchHint" style="color:transparent;">Passwords match</div>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Update Password &nbsp;<i class="bi bi-check2"></i></button>
      </form>
    </div>
  </div>
</div>
<script>
  function togglePw(id,btn){
    const el=document.getElementById(id);
    const show=el.type==='password';
    el.type=show?'text':'password';
    btn.innerHTML=show?'<i class="bi bi-eye-slash"></i>':'<i class="bi bi-eye"></i>';
  }
  const pwInput=document.getElementById('pwInput');
  const pwConfirm=document.getElementById('pwConfirm');
  const bar=document.getElementById('strengthBar');
  const hint=document.getElementById('strengthHint');
  const matchHint=document.getElementById('matchHint');
  function checkStrength(pw){
    let score=0;
    if(pw.length>=8)score++;if(pw.length>=12)score++;
    if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
    const levels=[{w:'20%',c:'#ef4444',t:'Too weak'},{w:'40%',c:'#f97316',t:'Weak'},{w:'60%',c:'#eab308',t:'Fair'},{w:'80%',c:'#22c55e',t:'Strong'},{w:'100%',c:'#10b981',t:'Very strong'}];
    const l=levels[Math.max(0,Math.min(score-1,4))];
    bar.style.width=l.w;bar.style.background=l.c;
    hint.style.color=l.c;hint.textContent=l.t;
  }
  function checkMatch(){
    if(!pwConfirm.value)return;
    const match=pwInput.value===pwConfirm.value;
    matchHint.style.color=match?'#10b981':'#ef4444';
    matchHint.textContent=match?'✓ Passwords match':'✗ Passwords do not match';
  }
  pwInput.addEventListener('input',()=>{checkStrength(pwInput.value);checkMatch();});
  pwConfirm.addEventListener('input',checkMatch);
</script>
{% endblock %}

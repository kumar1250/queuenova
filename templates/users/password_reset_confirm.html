{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block extra_css %}
<style>
.auth-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden;}
.auth-card-header{background:var(--brand);padding:2.5rem 2rem 2rem;text-align:center;}
.auth-icon-wrap{width:56px;height:56px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;margin-bottom:1rem;}
.auth-card-body{padding:2rem;}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card animate__animated animate__fadeInUp animate__faster">
        <div class="auth-card-header">
            <div class="auth-icon-wrap"><i class="bi bi-lock-fill"></i></div>
            <h2 class="text-white mb-1 fw-800" style="font-size:1.5rem;">New Password</h2>
            <p class="mb-0" style="color:rgba(255,255,255,0.5);font-size:0.875rem;">Choose a strong password for your account</p>
        </div>
        <div class="auth-card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Update Password <i class="bi bi-check2 ms-1"></i></button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

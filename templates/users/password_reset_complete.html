{% extends 'base.html' %}
{% block title %}Password Reset Successful{% endblock %}
{% block extra_css %}<style>.auth-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}</style>{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="text-center animate__animated animate__zoomIn animate__faster" style="max-width:400px;">
        <div style="width:80px;height:80px;background:#d1fae5;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:2.5rem;color:#065f46;margin-bottom:1.5rem;">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2 class="fw-800 mb-2">Password Updated!</h2>
        <p class="text-muted mb-4">Your password has been reset successfully. You can now sign in with your new credentials.</p>
        <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg btn-pill px-5">Go to Login</a>
    </div>
</div>
{% endblock %}

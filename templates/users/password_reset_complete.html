{% extends 'base.html' %}
{% block title %}Password Updated!{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&display=swap');
  :root{--ink:#0a0a0f;--glow:#10b981;--glow2:#059669;--text-hi:#f8f8ff;--text-lo:rgba(248,248,255,0.45);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);}
  .auth-page{min-height:calc(100vh - 72px);background:var(--ink);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;}
  .auth-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .auth-bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:orbFloat 9s ease-in-out infinite;}
  .orb-1{width:400px;height:400px;background:var(--glow);top:-80px;left:-80px;animation-delay:0s;}
  .orb-2{width:300px;height:300px;background:#0ea5e9;bottom:-60px;right:-60px;animation-delay:-5s;}
  @keyframes orbFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-22px);}}
  .auth-card{position:relative;z-index:10;width:100%;max-width:420px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;text-align:center;animation:cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes cardReveal{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glow),#0ea5e9,transparent);}
  .auth-card-inner{padding:3rem 2.25rem;}
  /* Checkmark animation */
  .success-icon{position:relative;display:inline-block;margin-bottom:1.75rem;}
  .success-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--glow),var(--glow2));display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 0 50px rgba(16,185,129,0.5);animation:successPop 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
  @keyframes successPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .success-check{font-size:2.2rem;color:white;animation:checkDraw 0.4s ease 0.7s both;}
  @keyframes checkDraw{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
  /* Particle burst */
  .particles{position:absolute;inset:0;pointer-events:none;}
  .particle{position:absolute;width:6px;height:6px;border-radius:50%;top:50%;left:50%;animation:burst 1s ease-out both;}
  @keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  .auth-title{font-family:'Clash Display','Syne',sans-serif;font-weight:700;font-size:1.8rem;color:var(--text-hi);margin-bottom:0.5rem;letter-spacing:-0.02em;}
  .auth-subtitle{color:var(--text-lo);font-size:0.875rem;line-height:1.7;margin-bottom:2rem;}
  .auth-btn{display:inline-flex;align-items:center;gap:8px;padding:0.85rem 2.5rem;border-radius:50px;background:linear-gradient(135deg,var(--glow),var(--glow2));border:none;color:white;font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 24px rgba(16,185,129,0.35);}
  .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(16,185,129,0.5);color:white;}
  .auth-card-inner>*{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
  .auth-card-inner>*:nth-child(1){animation-delay:0.3s}.auth-card-inner>*:nth-child(2){animation-delay:0.5s}.auth-card-inner>*:nth-child(3){animation-delay:0.65s}.auth-card-inner>*:nth-child(4){animation-delay:0.8s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg-orb orb-1"></div>
    <div class="auth-bg-orb orb-2"></div>
  </div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="success-icon">
        <div class="particles" id="particles"></div>
        <div class="success-circle"><span class="success-check"><i class="bi bi-check-lg"></i></span></div>
      </div>
      <h1 class="auth-title">Password updated!</h1>
      <p class="auth-subtitle">Your password has been reset successfully. You can now sign in with your new credentials.</p>
      <a href="{% url 'users:login' %}" class="auth-btn">Go to Login <i class="bi bi-arrow-right"></i></a>
    </div>
  </div>
</div>
<script>
  /* Particle burst */
  const container = document.getElementById('particles');
  const colors = ['#10b981','#34d399','#0ea5e9','#38bdf8','#6366f1','#a78bfa'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=(i/12)*360;const dist=50+Math.random()*30;
    p.style.cssText=`--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;background:${colors[i%colors.length]};animation-delay:${0.7+Math.random()*0.2}s;animation-duration:${0.8+Math.random()*0.4}s;`;
    container.appendChild(p);
  }
</script>
{% endblock %}

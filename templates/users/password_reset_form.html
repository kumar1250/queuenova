{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&display=swap');
  :root{--ink:#0a0a0f;--glow:#3b82f6;--glow2:#6366f1;--text-hi:#f8f8ff;--text-lo:rgba(248,248,255,0.45);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);}
  .auth-page{min-height:calc(100vh - 72px);background:var(--ink);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;}
  .auth-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .auth-bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:orbFloat 9s ease-in-out infinite;}
  .orb-1{width:400px;height:400px;background:var(--glow);top:-100px;right:-80px;animation-delay:0s;}
  .orb-2{width:300px;height:300px;background:var(--glow2);bottom:-80px;left:-60px;animation-delay:-5s;}
  @keyframes orbFloat{0%,100%{transform:translateY(0)scale(1);}50%{transform:translateY(-25px)scale(1.06);}}
  .auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:55px 55px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);}
  .auth-card{position:relative;z-index:10;width:100%;max-width:420px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;animation:cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes cardReveal{from{opacity:0;transform:translateY(32px)scale(0.97);}to{opacity:1;transform:translateY(0)scale(1);}}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glow),var(--glow2),transparent);animation:shimmer 4s linear infinite;background-size:200% 100%;}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  .auth-card-inner{padding:2.5rem 2.25rem;}
  .auth-logo-mark{width:56px;height:56px;background:linear-gradient(135deg,var(--glow),var(--glow2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;margin-bottom:1.5rem;box-shadow:0 0 36px rgba(59,130,246,0.4);animation:logoGlow 3s ease-in-out infinite;}
  @keyframes logoGlow{0%,100%{box-shadow:0 0 24px rgba(59,130,246,0.3);}50%{box-shadow:0 0 48px rgba(59,130,246,0.6);}}
  .auth-title{font-family:'Clash Display','Syne',sans-serif;font-weight:700;font-size:1.7rem;color:var(--text-hi);margin-bottom:0.3rem;letter-spacing:-0.03em;}
  .auth-subtitle{color:var(--text-lo);font-size:0.85rem;margin-bottom:2rem;line-height:1.6;}
  .field-wrap{margin-bottom:1.25rem;}
  .field-label{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-lo);margin-bottom:0.5rem;transition:color 0.2s;}
  .field-input-wrap{position:relative;}
  .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.22);pointer-events:none;transition:color 0.2s;}
  .auth-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:10px;color:var(--text-hi);font-size:0.9rem;padding:0.75rem 0.9rem 0.75rem 2.6rem;outline:none;transition:all 0.25s;-webkit-appearance:none;}
  .auth-input::placeholder{color:rgba(255,255,255,0.18);}
  .auth-input:focus{border-color:var(--glow);background:rgba(59,130,246,0.07);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
  .field-wrap:focus-within .field-label{color:var(--glow);}
  .field-wrap:focus-within .field-icon{color:var(--glow);}
  .auth-btn{width:100%;background:linear-gradient(135deg,var(--glow),var(--glow2));border:none;border-radius:10px;color:white;font-size:0.9rem;font-weight:700;padding:0.85rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(59,130,246,0.3);}
  .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,0.5);}
  .auth-btn:active{transform:translateY(0);}
  .auth-back{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-lo);text-decoration:none;margin-top:1.25rem;transition:color 0.2s;}
  .auth-back:hover{color:var(--text-hi);}
  .auth-card-inner>*{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
  .auth-card-inner>*:nth-child(1){animation-delay:0.1s}.auth-card-inner>*:nth-child(2){animation-delay:0.15s}.auth-card-inner>*:nth-child(3){animation-delay:0.2s}.auth-card-inner>*:nth-child(4){animation-delay:0.25s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){.auth-card-inner{padding:2rem 1.5rem;}}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg-orb orb-1"></div>
    <div class="auth-bg-orb orb-2"></div>
    <div class="auth-grid"></div>
  </div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo-mark"><i class="bi bi-key-fill"></i></div>
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Enter your registered email and we'll send a 6-digit OTP to reset your password.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="field-wrap">
          <label class="field-label" for="id_email">Email Address</label>
          <div class="field-input-wrap">
            <input type="email" name="email" id="id_email" class="auth-input" placeholder="you@example.com" required autofocus>
            <i class="bi bi-envelope field-icon"></i>
          </div>
        </div>
        <button type="submit" class="auth-btn">Send OTP Code &nbsp;<i class="bi bi-send-fill"></i></button>
      </form>
      <a href="{% url 'users:login' %}" class="auth-back"><i class="bi bi-arrow-left"></i>Back to login</a>
    </div>
  </div>
</div>
{% endblock %}

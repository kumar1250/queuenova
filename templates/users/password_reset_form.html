{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block extra_css %}
<style>
.auth-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden;}
.auth-card-header{background:var(--brand);padding:2.5rem 2rem 2rem;text-align:center;}
.auth-icon-wrap{width:56px;height:56px;background:var(--info);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;margin-bottom:1rem;}
.auth-card-body{padding:2rem;}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card animate__animated animate__fadeInUp animate__faster">
        <div class="auth-card-header">
            <div class="auth-icon-wrap"><i class="bi bi-key-fill"></i></div>
            <h2 class="text-white mb-1 fw-800" style="font-size:1.5rem;">Reset Password</h2>
            <p class="mb-0" style="color:rgba(255,255,255,0.5);font-size:0.875rem;">We'll send a one-time code to your email</p>
        </div>
        <div class="auth-card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Send OTP Code <i class="bi bi-send ms-1"></i></button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'users:login' %}" class="text-decoration-none" style="color:var(--text-muted);font-size:0.875rem;"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

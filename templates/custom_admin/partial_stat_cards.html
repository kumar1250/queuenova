<div class="stat-marquee-card">
    <a href="{% url 'custom_admin:manage_organizations' %}" class="text-decoration-none">
        <div class="card p-3">
            <div class="stat-icon mb-2" style="background:#dbeafe;color:#1d4ed8;"><i class="bi bi-building"></i></div>
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;">Organizations</div>
            <div class="fw-800 mt-1" style="font-size:1.8rem;font-family:'Syne',sans-serif;line-height:1;">{{ org_count }}</div>
        </div>
    </a>
</div>

<div class="stat-marquee-card">
    <a href="{% url 'custom_admin:manage_services' %}" class="text-decoration-none">
        <div class="card p-3">
            <div class="stat-icon mb-2" style="background:#d1fae5;color:#065f46;"><i class="bi bi-layers-fill"></i></div>
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;">Active Services</div>
            <div class="fw-800 mt-1" style="font-size:1.8rem;font-family:'Syne',sans-serif;line-height:1;">{{ service_count }}</div>
        </div>
    </a>
</div>

<div class="stat-marquee-card">
    <a href="{% url 'tokens:queue_dashboard' %}" class="text-decoration-none">
        <div class="card p-3">
            <div class="stat-icon mb-2" style="background:#fef3c7;color:#92400e;"><i class="bi bi-ticket-perforated-fill"></i></div>
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;">Total Tokens</div>
            <div class="fw-800 mt-1" style="font-size:1.8rem;font-family:'Syne',sans-serif;line-height:1;">{{ total_tokens }}</div>
        </div>
    </a>
</div>

<div class="stat-marquee-card">
    <a href="{% url 'tokens:queue_dashboard' %}" class="text-decoration-none">
        <div class="card p-3">
            <div class="stat-icon mb-2" style="background:#ede9fe;color:#5b21b6;"><i class="bi bi-people-fill"></i></div>
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;">Waiting in Queue</div>
            <div class="fw-800 mt-1" style="font-size:1.8rem;font-family:'Syne',sans-serif;line-height:1;">{{ waiting_tokens }}</div>
        </div>
    </a>
</div>

<div class="stat-marquee-card">
    <a href="{% url 'custom_admin:manage_users' %}" class="text-decoration-none">
        <div class="card p-3">
            <div class="stat-icon mb-2" style="background:#fee2e2;color:#991b1b;"><i class="bi bi-person-badge-fill"></i></div>
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;">Total Users</div>
            <div class="fw-800 mt-1" style="font-size:1.8rem;font-family:'Syne',sans-serif;line-height:1;">{{ user_count|default:"—" }}</div>
        </div>
    </a>
</div>
